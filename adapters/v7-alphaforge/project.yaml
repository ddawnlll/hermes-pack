# V7/AlphaForge project adapter for Hermes Orchestrator Pack
project:
  name: "AlphaForge"
  objective: "Make AlphaForge measurably better at finding robust, profitable alphas. 'Better' = evidence-backed improvement in at least one of: R-persistence rate, profit factor, Sharpe, OOS robustness, drawdown, false-positive rate, reproducibility."
  board_name: "alphaforge"
  board_desc: "V7/AlphaForge orchestration"

hermes:
  setup_mode: "orchestrator"
  profile_orchestrator: "af-orchestrator"
  profile_worker_prefix: "af-worker"
  worker_count: 3
  tick_name: "af-orchestrator-tick"
  tick_schedule: "every 45m"
  delivery: "local"

  provider:
    orchestrator: "anthropic"
    orchestrator_model: "__NEEDS_LOCAL_VERIFICATION__"
    worker: "openrouter"
    worker_model: "__NEEDS_LOCAL_VERIFICATION__"
    # Provider fallback chains (LiteLLM proxy) — "never-dies" guarantee
    # Last model in each chain MUST be a local model (Ollama/LM Studio)
    orchestrator_chain:
      - "claude-sonnet-4-20250514"          # primary
      - "deepseek/deepseek-chat"            # fallback 1
      - "ollama/llama3"                     # local fallback (never-dies)
    worker_chain:
      - "openrouter/mistralai/mistral-small"  # primary (cheap, DIFFERENT from challenger)
      - "ollama/llama3"                     # local fallback
    challenger_model: "openrouter/deepseek/deepseek-chat"
    challenger_chain:
      - "deepseek/deepseek-chat"            # different model family from worker
      - "ollama/llama3"                     # local fallback
    arbiter_model: "anthropic/gpt-4o"
    arbiter_chain:
      - "gpt-4o"                            # premium (DIFFERENT from orchestrator)
      - "claude-sonnet-4-20250514"          # mid fallback
      - "ollama/llama3"                     # local fallback

paths:
  ledger: ".alphaforge/orchestrator"

boundaries:
  allowed:
    - "alphaforge/"
    - "simulation/"
    - "lib/"
  forbidden:
    - "runtime/"
    - "exchange/"
    - "risk/"

merge_policy: "pr_only"
max_parallel_workers: 3
max_llm_spend_per_day_usd: 25

runner:
  command: |
    python -m alphaforge.run --config {config} --out {ledger}/runs/{run_id}.json

# ── Praxis Truth Kernel Integration ─────────────────────────────────────
# Praxis (ddawnlll/praxis) is the independent Truth Kernel for agent output
# verification. Hermes Pack does NOT reimplement gate logic — it calls the
# real Praxis CLI. See tools/praxis/ submodule.
praxis:
  enabled: true
  cli: "tools/praxis-bridge.sh"
  plan_spec: ".alphaforge/orchestrator/planspec.yaml"
  verify_on: "worker_completion"

  gates:
    - schemaGate
    - lockGate
    - evidenceGate
    - wiringGate
    - execGate
    - finalGate

  memory_policy:
    workers_can_write_memory: false
    retain_only_after_gate: true
    retain_source: "praxis_verdict"

  risk_based_gating:
    low:
      gates: ["T1"]
      challenger: false
    medium:
      gates: ["T1", "T2"]
      confirm_required: true
    high:
      gates: ["T1", "T2", "T3"]
      praxis_final_required: true
    critical:
      gates: ["T1", "T2", "T3", "T4"]
      human_always: true
