# PRAXIS PlanSpec v0.1 — Issue #30: Curiosity Budget
planSpecVersion: "0.1.0"
kind: "ImplementationPlan"
profile: "praxis-v0.1"

metadata:
  planId: "HERMES-30"
  title: "Curiosity budget: korumalı keşif bütçesi (taban %20)"
  description: "Protected discovery budget — minimum 20% of total, ROI/self-grade gates cannot touch it."
  createdAt: "2026-07-09T08:00:00Z"
  humanId: "hermes-agent"
  status: "draft"

authority:
  executor: "ClaudeCode"
  completionAuthority: "PraxisTruthKernel"
  agentSelfReportIsClaimOnly: true
  criteriaSourceRequired: "human"
  reportsAreEvidenceOnly: true
  pluginOwnsTruth: false

workspace:
  root: "."
  allowedFiles:
    - "templates/curiosity-budget.py"
    - "templates/state.json"
    - "schema/state.schema.json"
    - "schema/tests/test_curiosity_budget.py"
    - ".praxis/*"
  forbiddenFiles: []

execution:
  mode: "single_session"
  agent: "claude-code"
  autonomy: "implementation_allowed"
  canModifyCode: true
  canModifyPlan: false
  canModifyAcceptanceCriteria: false
  maxRepairLoops: 2

tasks:
  - id: "task-curiosity"
    title: "Curiosity Budget"
    objective: "Protected discovery budget with minimum 20% allocation"
    implementation:
      instructions:
        - "curiosity-budget.py at templates/curiosity-budget.py"
        - "state.schema.json add curiosity_budget_usd"
        - "Minimum 20% enforced"
        - "ROI gate (#29) cannot throttle curiosity spending"
      expectedOutputs:
        - "All acceptance criteria met"
    artifactPolicy:
      class: "library_code"
      wiringRequired: false
      reachabilityRequired: false
      executionRequired: true
      deterministicEvidenceRequired: true
      advisoryReviewAllowed: false
    acceptanceCriteria:
      - id: "AC-1"
        description: "state.schema.json has curiosity_budget_usd field"
        level: "required"
        humanApproved: true
        criteriaSource: "human"
        verification:
          type: "test_output"
          commandRef: "CMD-TEST-CURIOUSITY"
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs:
            - "command"
        requiredEvidence:
          - "command"
      - id: "AC-2"
        description: "Base 20% minimum never violated"
        level: "required"
        humanApproved: true
        criteriaSource: "human"
        verification:
          type: "test_output"
          commandRef: "CMD-TEST-CURIOUSITY"
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs:
            - "command"
        requiredEvidence:
          - "command"
      - id: "AC-3"
        description: "ROI gate does not see curiosity spending"
        level: "required"
        humanApproved: true
        criteriaSource: "human"
        verification:
          type: "test_output"
          commandRef: "CMD-TEST-CURIOUSITY"
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs:
            - "command"
        requiredEvidence:
          - "command"

commands:
  exactAllowedCommands:
    - id: "CMD-TEST-CURIOUSITY"
      kind: "final_validation"
      command: "python schema/tests/test_curiosity_budget.py"
      evidenceRequired: true
      timeoutSeconds: 60
      noTestsFoundIsFailure: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true
  validationEvidenceRules:
    finalPromotionRequiresExactAllowedCommand: true
    discoveryCommandsMayNotSatisfyFinalValidation: true
    runtimeGrantCommandsCanSatisfyValidationOnlyIfGrantStatesValidationPurpose: true
  hardDeniedCommands:
    - command: "rm -rf"
      reason: "Destructive."

evidence:
  ledgerRequired: true
  requiredEvidenceTypes: ["diff", "source", "command", "test_output"]
  hashWhenAvailable: true

gates:
  sequence: ["SchemaGate", "LockGate", "EvidenceGate", "WiringGate", "ExecGate", "FinalGate"]
  verdicts: ["PASS", "HOLD", "FAIL"]
  reasonCodes:
    SchemaGate: ["SCHEMA_PASS"]
    EvidenceGate: ["EVIDENCE_MISSING"]
    ExecGate: ["TESTS_RAN_ZERO"]
    FinalGate: ["ALL_CRITERIA_MET", "CRITERIA_PARTIAL"]

repair:
  enabled: true
  failedCriteriaOnly: true
  mayModifyAcceptanceCriteria: false
  mayModifyPlan: false
  allowedFilesFromFailedTasksOnly: true
  maxRepairLoops: 2
  reverifyCommand: "python schema/tests/test_curiosity_budget.py"
  repairPacketFormat:
    json: true
    markdown: true

locking:
  lockRequired: true
  canonicalHashRequired: true
  planLockFile: ".praxis/issue-30.lock"
  hashes: ["planHash", "acceptanceCriteriaHash", "artifactPolicyHash", "commandPolicyHash", "allowedFilesHash", "forbiddenFilesHash"]

reports:
  protocol: "ACCP"
  artifactDirectory: "reports/"
  reportsAreEvidenceOnly: true
  reportsDoNotAuthorizeExecution: true
  commandEvidenceRequired: true
  repairPacketRequiredOnHoldOrFail: true
