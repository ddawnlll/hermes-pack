# PRAXIS PlanSpec v0.1 — Issue #26: Adaptif Ratchet
planSpecVersion: "0.1.0"
kind: "ImplementationPlan"
profile: "praxis-v0.1"

metadata:
  planId: "HERMES-26"
  title: "Adaptif ratchet: Red Team çıtası pass-rate'e göre yükselsin/alçalsın"
  description: "ratchet.json tracks Red Team blocking ratio; auto-adjusts difficulty level."
  createdAt: "2026-07-09T08:00:00Z"
  humanId: "hermes-agent"
  status: "draft"

authority:
  executor: "ClaudeCode"
  completionAuthority: "PraxisTruthKernel"
  agentSelfReportIsClaimOnly: true
  criteriaSourceRequired: "human"
  reportsAreEvidenceOnly: true
  pluginOwnsTruth: false

workspace:
  root: "."
  allowedFiles:
    - "templates/ratchet.json"
    - "templates/scripts/ratchet-update.py"
    - "templates/scripts/ratchet-update.sh"
    - "templates/SOUL.redteam.md"
    - "schema/tests/test_ratchet.py"
    - ".praxis/*"
  forbiddenFiles: []

execution:
  mode: "single_session"
  agent: "claude-code"
  autonomy: "implementation_allowed"
  canModifyCode: true
  canModifyPlan: false
  canModifyAcceptanceCriteria: false
  maxRepairLoops: 2

tasks:
  - id: "task-ratchet"
    title: "Adaptive Ratchet"
    objective: "ratchet.json schema, update logic, SOUL.redteam.md integration"
    implementation:
      instructions:
        - "ratchet.json at templates/ratchet.json"
        - "ratchet-update.sh at templates/scripts/ratchet-update.sh"
        - "Test at schema/tests/test_ratchet.py"
      expectedOutputs:
        - "All acceptance criteria met"
    artifactPolicy:
      class: "library_code"
      wiringRequired: false
      reachabilityRequired: false
      executionRequired: true
      deterministicEvidenceRequired: true
      advisoryReviewAllowed: false
    acceptanceCriteria:
      - id: "AC-1"
        description: "ratchet.json template exists with correct schema"
        level: "required"
        humanApproved: true
        criteriaSource: "human"
        verification:
          type: "file_exists"
          path: "templates/ratchet.json"
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs:
            - "source"
        requiredEvidence:
          - "source"
      - id: "AC-2"
        description: "Low blocking ratio triggers tighten"
        level: "required"
        humanApproved: true
        criteriaSource: "human"
        verification:
          type: "test_output"
          commandRef: "CMD-TEST-RATCHET"
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs:
            - "command"
        requiredEvidence:
          - "command"
      - id: "AC-3"
        description: "High blocking ratio triggers loosen"
        level: "required"
        humanApproved: true
        criteriaSource: "human"
        verification:
          type: "test_output"
          commandRef: "CMD-TEST-RATCHET"
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs:
            - "command"
        requiredEvidence:
          - "command"
      - id: "AC-4"
        description: "Level clamped to [-3, 5]"
        level: "required"
        humanApproved: true
        criteriaSource: "human"
        verification:
          type: "test_output"
          commandRef: "CMD-TEST-RATCHET"
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs:
            - "command"
        requiredEvidence:
          - "command"
      - id: "AC-5"
        description: "SOUL.redteam.md references ratchet"
        level: "required"
        humanApproved: true
        criteriaSource: "human"
        verification:
          type: "test_output"
          commandRef: "CMD-TEST-RATCHET"
          deterministic: true
          canSatisfyFinalGate: true
          advisoryOnly: false
          evidenceRefs:
            - "command"
        requiredEvidence:
          - "command"

commands:
  exactAllowedCommands:
    - id: "CMD-TEST-RATCHET"
      kind: "final_validation"
      command: "python schema/tests/test_ratchet.py"
      evidenceRequired: true
      timeoutSeconds: 60
      noTestsFoundIsFailure: true
      expectedExitCode: 0
      networkAllowed: false
      shellAllowed: true
  validationEvidenceRules:
    finalPromotionRequiresExactAllowedCommand: true
    discoveryCommandsMayNotSatisfyFinalValidation: true
    runtimeGrantCommandsCanSatisfyValidationOnlyIfGrantStatesValidationPurpose: true
  hardDeniedCommands:
    - command: "rm -rf"
      reason: "Destructive."

evidence:
  ledgerRequired: true
  requiredEvidenceTypes: ["diff", "source", "command", "test_output"]
  hashWhenAvailable: true

gates:
  sequence: ["SchemaGate", "LockGate", "EvidenceGate", "WiringGate", "ExecGate", "FinalGate"]
  verdicts: ["PASS", "HOLD", "FAIL"]
  reasonCodes:
    SchemaGate: ["SCHEMA_PASS"]
    EvidenceGate: ["EVIDENCE_MISSING"]
    ExecGate: ["TESTS_RAN_ZERO"]
    FinalGate: ["ALL_CRITERIA_MET", "CRITERIA_PARTIAL"]

repair:
  enabled: true
  failedCriteriaOnly: true
  mayModifyAcceptanceCriteria: false
  mayModifyPlan: false
  allowedFilesFromFailedTasksOnly: true
  maxRepairLoops: 2
  reverifyCommand: "python schema/tests/test_ratchet.py"
  repairPacketFormat:
    json: true
    markdown: true

locking:
  lockRequired: true
  canonicalHashRequired: true
  planLockFile: ".praxis/issue-26.lock"
  hashes: ["planHash", "acceptanceCriteriaHash", "artifactPolicyHash", "commandPolicyHash", "allowedFilesHash", "forbiddenFilesHash"]

reports:
  protocol: "ACCP"
  artifactDirectory: "reports/"
  reportsAreEvidenceOnly: true
  reportsDoNotAuthorizeExecution: true
  commandEvidenceRequired: true
  repairPacketRequiredOnHoldOrFail: true
