# ============================================================================
# LiteLLM Proxy Configuration — generated by Hermes Pack bootstrap
# ============================================================================
# Each profile gets a model chain. The last model in each chain MUST be a
# local model (Ollama/LM Studio) for the "never-dies" guarantee.
# See: https://docs.litellm.ai/docs/proxy/quick_start
# ============================================================================

general_settings:
  master_key: "${LITELLM_MASTER_KEY:-sk-hermes-proxy}"
  database_url: "${LITELLM_DB_URL:-}"  # optional: persist usage
  proxy_batch_write_interval: 10

model_list:
  # ── Orchestrator chain ──────────────────────────────────────────────────
  - model_name: "__HERMES_ORCH_MODEL__"
    litellm_params:
      model: "__HERMES_ORCH_CHAIN_0__"
      api_key: "${ANTHROPIC_API_KEY}"
      rpm: 10
      fallbacks:
        - "__HERMES_ORCH_CHAIN_1__"
  - model_name: "__HERMES_ORCH_MODEL__"
    litellm_params:
      model: "__HERMES_ORCH_CHAIN_1__"
      api_key: "${OPENROUTER_API_KEY}"
      rpm: 20
      fallbacks:
        - "__HERMES_ORCH_CHAIN_2__"
  - model_name: "__HERMES_ORCH_MODEL__"
    litellm_params:
      model: "__HERMES_ORCH_CHAIN_2__"
      api_base: "${OLLAMA_API_BASE:-http://localhost:11434}"
      api_key: "${OLLAMA_API_KEY:-ollama}"

  # ── Worker chain ────────────────────────────────────────────────────────
  - model_name: "__HERMES_WORKER_MODEL__"
    litellm_params:
      model: "__HERMES_WORKER_CHAIN_0__"
      api_key: "${OPENROUTER_API_KEY}"
      rpm: 30
      fallbacks:
        - "__HERMES_WORKER_CHAIN_1__"
  - model_name: "__HERMES_WORKER_MODEL__"
    litellm_params:
      model: "__HERMES_WORKER_CHAIN_1__"
      api_base: "${OLLAMA_API_BASE:-http://localhost:11434}"
      api_key: "${OLLAMA_API_KEY:-ollama}"

  # ── Challenger chain (different model from orchestrator/worker) ──────────
  - model_name: "__HERMES_CHALLENGER_MODEL__"
    litellm_params:
      model: "__HERMES_CHALLENGER_CHAIN_0__"
      api_key: "${OPENROUTER_API_KEY}"
      rpm: 20
      fallbacks:
        - "__HERMES_CHALLENGER_CHAIN_1__"
  - model_name: "__HERMES_CHALLENGER_MODEL__"
    litellm_params:
      model: "__HERMES_CHALLENGER_CHAIN_1__"
      api_base: "${OLLAMA_API_BASE:-http://localhost:11434}"
      api_key: "${OLLAMA_API_KEY:-ollama}"

  # ── Arbiter chain (premium models, different from challenger) ────────────
  - model_name: "__HERMES_ARBITER_MODEL__"
    litellm_params:
      model: "__HERMES_ARBITER_CHAIN_0__"
      api_key: "${ANTHROPIC_API_KEY}"
      rpm: 5
      fallbacks:
        - "__HERMES_ARBITER_CHAIN_1__"
  - model_name: "__HERMES_ARBITER_MODEL__"
    litellm_params:
      model: "__HERMES_ARBITER_CHAIN_1__"
      api_key: "${OPENROUTER_API_KEY}"
      rpm: 10
      fallbacks:
        - "__HERMES_ARBITER_CHAIN_2__"
  - model_name: "__HERMES_ARBITER_MODEL__"
    litellm_params:
      model: "__HERMES_ARBITER_CHAIN_2__"
      api_base: "${OLLAMA_API_BASE:-http://localhost:11434}"
      api_key: "${OLLAMA_API_KEY:-ollama}"

router_settings:
  enable_loadbalancing: true
  routing_strategy: "usage-based"
  allowed_fails: 3
  cooldown_time: 30
  num_retries: 2
  retry_after: 5
  fallback_method: "sequential"

litellm_settings:
  drop_params: true
  set_verbose: false
  cache: false
